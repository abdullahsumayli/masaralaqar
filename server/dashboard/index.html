<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masar AI Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f0f0f;
        color: #fff;
        min-height: 100vh;
      }

      .header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        padding: 20px 40px;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .header h1 {
        font-size: 24px;
        color: #f97316;
      }

      .header .status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #10b981;
        font-size: 14px;
      }

      .header .status::before {
        content: "";
        width: 8px;
        height: 8px;
        background: #10b981;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 30px;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border: 1px solid #333;
        border-radius: 16px;
        padding: 24px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 30px rgba(249, 115, 22, 0.1);
      }

      .stat-card .label {
        color: #888;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .stat-card .value {
        font-size: 36px;
        font-weight: bold;
        color: #f97316;
      }

      .stat-card .icon {
        float: left;
        font-size: 40px;
        opacity: 0.3;
      }

      .section {
        margin-bottom: 40px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .section-title {
        font-size: 20px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .section-title::before {
        content: "";
        width: 4px;
        height: 24px;
        background: #f97316;
        border-radius: 2px;
      }

      .refresh-btn {
        background: #f97316;
        color: #fff;
        border: none;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: background 0.2s;
      }

      .refresh-btn:hover {
        background: #ea580c;
      }

      .table-container {
        background: #1a1a2e;
        border: 1px solid #333;
        border-radius: 16px;
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #16213e;
        padding: 16px;
        text-align: right;
        font-weight: 600;
        color: #888;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      td {
        padding: 16px;
        border-bottom: 1px solid #2a2a3e;
        color: #ddd;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background: rgba(249, 115, 22, 0.05);
      }

      .badge {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
      }

      .badge-buy {
        background: rgba(16, 185, 129, 0.2);
        color: #10b981;
      }

      .badge-rent {
        background: rgba(59, 130, 246, 0.2);
        color: #3b82f6;
      }

      .whatsapp-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #25d366;
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;
        transition: background 0.2s;
      }

      .whatsapp-btn:hover {
        background: #128c7e;
      }

      .property-image {
        width: 60px;
        height: 60px;
        border-radius: 8px;
        object-fit: cover;
        background: #333;
      }

      .property-link {
        color: #f97316;
        text-decoration: none;
      }

      .property-link:hover {
        text-decoration: underline;
      }

      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #666;
      }

      .empty-state .icon {
        font-size: 48px;
        margin-bottom: 16px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .loading::after {
        content: "";
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #333;
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        .header {
          padding: 15px 20px;
          flex-direction: column;
          gap: 10px;
        }

        .container {
          padding: 15px;
        }

        .stat-card .value {
          font-size: 28px;
        }

        table {
          font-size: 13px;
        }

        th,
        td {
          padding: 12px 8px;
        }

        .whatsapp-btn {
          padding: 6px 12px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>🏠 Masar AI Dashboard</h1>
      <div class="status">متصل - السيرفر يعمل</div>
    </header>

    <div class="container">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <span class="icon">👥</span>
          <div class="label">إجمالي العملاء المحتملين</div>
          <div class="value" id="total-leads">-</div>
        </div>
        <div class="stat-card">
          <span class="icon">🏢</span>
          <div class="label">إجمالي العقارات</div>
          <div class="value" id="total-properties">-</div>
        </div>
        <div class="stat-card">
          <span class="icon">💬</span>
          <div class="label">جلسات المحادثة</div>
          <div class="value" id="total-sessions">-</div>
        </div>
      </div>

      <!-- Leads Section -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">العملاء المحتملين (Leads)</h2>
          <button class="refresh-btn" onclick="loadLeads()">🔄 تحديث</button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>الهاتف</th>
                <th>المدينة</th>
                <th>نوع العقار</th>
                <th>الغرض</th>
                <th>الميزانية</th>
                <th>التاريخ</th>
                <th>إجراء</th>
              </tr>
            </thead>
            <tbody id="leads-table">
              <tr>
                <td colspan="7" class="loading">جاري التحميل...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Properties Section -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">العقارات المتاحة</h2>
          <button class="refresh-btn" onclick="loadProperties()">
            🔄 تحديث
          </button>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>الصورة</th>
                <th>العنوان</th>
                <th>المدينة</th>
                <th>النوع</th>
                <th>السعر</th>
                <th>الرابط</th>
              </tr>
            </thead>
            <tbody id="properties-table">
              <tr>
                <td colspan="6" class="loading">جاري التحميل...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
